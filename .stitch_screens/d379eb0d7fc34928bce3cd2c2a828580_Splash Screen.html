<style type="text/tailwindcss">

            .material-symbols-outlined {

<body class="bg-surface text-on-surface h-screen w-screen overflow-hidden relative flex flex-col items-center justify-center selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-primary-fixed rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-float-slow pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-secondary-fixed rounded-full mix-blend-multiply filter blur-[120px] opacity-40 animate-float-delayed pointer-events-none"></div>
<div class="z-10 flex flex-col items-center justify-center text-center px-container-padding max-w-md w-full">
<div class="relative mb-8 w-32 h-32 flex items-center justify-center animate-scale-in">
<div class="absolute inset-0 bg-gradient-to-br from-primary to-secondary-container rounded-[2rem] transform rotate-12 opacity-80 shadow-2xl blur-sm"></div>
<div class="absolute inset-0 bg-gradient-to-tr from-secondary to-primary-container rounded-[2rem] transform -rotate-6 opacity-90 shadow-xl backdrop-blur-xl border border-white/20 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[64px]" style="font-variation-settings: 'FILL' 0, 'wght' 300;">
                    currency_exchange
                </span>
</div>
<div class="absolute inset-0 rounded-[2rem] shadow-[inset_0_2px_20px_rgba(255,255,255,0.4)] pointer-events-none"></div>
</div>
<div class="flex flex-col items-center animate-fade-in-up" style="animation-delay: 0.3s; opacity: 0;">
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight mb-3">
                ZeroPay
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant tracking-wide">
                The Blockchain Commerce OS
            </p>
</div>
</div>
<div class="absolute bottom-12 w-full flex justify-center animate-fade-in-up" style="animation-delay: 0.8s; opacity: 0;">
<div class="h-1 w-24 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary rounded-full relative" id="loading-bar" style="transform: translateX(165.558076px);"></div>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingBar = document.getElementById('loading-bar');
            let progress = 0;
            
            const animateLoading = () => {
                progress += Math.random() * 2;
                if (progress > 100) progress = 0; 
                loadingBar.style.transform = `translateX(${progress * 2}px)`;
                requestAnimationFrame(animateLoading);
            };
            
            animateLoading();
        });
    </script>
</body></html>
