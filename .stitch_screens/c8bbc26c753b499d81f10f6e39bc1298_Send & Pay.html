<script>
        // Simple Numpad Logic
        let currentAmount = "0";
        const amountDisplay = document.getElementById('amountDisplay');
        
        function appendNumber(num) {
            if (currentAmount === "0" && num !== ".") {
                currentAmount = num;
            } else if (num === "." && currentAmount.includes(".")) {
                return; // prevent multiple decimals
            } else {
                // limit length
                if(currentAmount.length < 10) {
                     currentAmount += num;
                }
            }
            updateDisplay();
        }

        function deleteNumber() {
            if (currentAmount.length > 1) {
                currentAmount = currentAmount.slice(0, -1);
            } else {
                currentAmount = "0";
            }
            updateDisplay();
        }

        function updateDisplay() {
            // Basic formatting for display purposes
            if(currentAmount === "0") {
                 amountDisplay.innerText = "0.00";
                 amountDisplay.classList.remove('text-primary');
                 amountDisplay.classList.add('text-on-surface');
                 return;
            }

            amountDisplay.innerText = currentAmount;
            
            // Visual feedback when typing
            amountDisplay.classList.add('text-primary');
            setTimeout(() => {
                amountDisplay.classList.remove('text-primary');
                amountDisplay.classList.add('text-on-surface');
            }, 150);
        }

        // Mock Trust Check Logic
        const addressInput = document.getElementById('addressInput');
        const trustWarning = document.getElementById('trustWarning');
        const trustSuccess = document.getElementById('trustSuccess');

        addressInput.addEventListener('input', function(e) {
            const val = e.target.value.toLowerCase();
            trustWarning.classList.add('hidden');
            trustSuccess.classList.add('hidden');

            if (val.length > 5) {
                // Mock logic: if it contains 'x' but isn't one of our mock knowns
                if (val.includes('0xamazon') || val.includes('0xstripe')) {
                     trustSuccess.classList.remove('hidden');
                } else if (val.startsWith('0x')) {
                     trustWarning.classList.remove('hidden');
                }
            }
        });

        // Fill address from book
        function fillAddress(addr) {
            addressInput.value = addr;
            // Trigger input event to run validation
            const event = new Event('input', {
                bubbles: true,
                cancelable: true,
            });
            addressInput.dispatchEvent(event);
        }
    </script>
